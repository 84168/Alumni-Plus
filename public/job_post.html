<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post a Job / Internship</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Lato:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #eef2f7;
            --surface: #f8fafc;
            --card: #ffffff;
            --border: #dde3ec;
            --text: #0f1923;
            --text-sec: #374151;
            --muted: #64748b;
            --accent: #1e3a5f;
            --accent-lt: #e8eef6;
            --gold: #c49a2a;
            --gold-lt: #fdf8ee;
            --danger: #9b2c2c;
            --danger-lt: #fff5f5;
            --radius: 16px;
            --shadow: 0 2px 16px rgba(15, 25, 35, 0.08);
            --shadow-lg: 0 8px 40px rgba(15, 25, 35, 0.12);
        }

        body {
            font-family: 'Lato', sans-serif;
            background-color: var(--bg);
            background-image:
                radial-gradient(ellipse at 15% 10%, rgba(30, 58, 95, 0.07) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 88%, rgba(196, 154, 42, 0.06) 0%, transparent 55%);
            min-height: 100vh;
            color: var(--text);
            padding: 0 0 80px;
        }

        /* ── Top Bar ── */


        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: var(--surface);
            color: var(--accent);
            border: 1.5px solid var(--border);
            padding: 8px 16px;
            border-radius: 9px;
            font-size: 13.5px;
            font-family: 'Lato', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: var(--accent-lt);
            border-color: #a8bdd6;
        }


        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 8px 14px;
            font-size: 13px;
            font-weight: 600;
            font-family: 'Lato', sans-serif;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: all 0.2s;
            z-index: 1000;
        }

        .back-btn:hover {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            transform: translateY(-1px);
        }

        /* ── Page Header ── */
        .page-header {
            max-width: 760px;
            margin: 44px auto 32px;
            padding: 0 24px;
            text-align: center;
        }

        .page-eyebrow {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 10px;
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(26px, 4vw, 38px);
            font-weight: 600;
            color: var(--text);
            line-height: 1.2;
            margin-bottom: 10px;
        }

        .page-subtitle {
            font-size: 15px;
            color: var(--muted);
            font-weight: 400;
            line-height: 1.6;
        }

        .title-rule {
            width: 44px;
            height: 2.5px;
            background: var(--gold);
            margin: 16px auto 0;
            border-radius: 2px;
        }

        /* ── Form Card ── */
        .form-card {
            max-width: 760px;
            margin: 0 auto;
            padding: 0 24px;
            animation: slideUp 0.4s ease-out both;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-card-inner {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
        }

        .card-accent-bar {
            height: 3px;
            background: linear-gradient(90deg, var(--accent) 0%, var(--gold) 100%);
        }

        /* ── Section ── */
        .form-section {
            padding: 30px 36px;
            border-bottom: 1px solid var(--border);
        }

        .form-section:last-of-type {
            border-bottom: none;
        }

        .section-heading {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2.2px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 22px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-heading::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ── Grid ── */
        .form-row {
            display: grid;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-row:last-child {
            margin-bottom: 0;
        }

        .form-row.cols-1 {
            grid-template-columns: 1fr;
        }

        .form-row.cols-2 {
            grid-template-columns: 1fr 1fr;
        }

        .form-row.cols-3 {
            grid-template-columns: 1fr 1fr 1fr;
        }

        /* ── Field ── */
        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field label {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.6px;
            text-transform: uppercase;
            color: var(--text-sec);
        }

        .field label .req {
            color: var(--gold);
            margin-left: 2px;
        }

        .field input,
        .field select,
        .field textarea {
            font-family: 'Lato', sans-serif;
            font-size: 14.5px;
            font-weight: 400;
            color: var(--text);
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: 11px 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
            width: 100%;
        }

        .field input::placeholder,
        .field textarea::placeholder {
            color: #a0aab8;
            font-weight: 300;
        }

        .field input:focus,
        .field select:focus,
        .field textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(30, 58, 95, 0.09);
            background: #fff;
        }

        .field textarea {
            resize: vertical;
            min-height: 96px;
            line-height: 1.65;
        }

        .field select {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l5 5 5-5' stroke='%2364748b' stroke-width='1.6' stroke-linecap='round'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 14px center;
            padding-right: 36px;
        }

        .field select option {
            color: var(--text);
        }

        .field input[type="date"] {
            cursor: pointer;
            color: var(--text);
        }

        .field input[type="date"]::-webkit-calendar-picker-indicator {
            opacity: 0.5;
            cursor: pointer;
            filter: invert(30%);
        }

        .field-hint {
            font-size: 12px;
            color: var(--muted);
            font-weight: 400;
            line-height: 1.4;
        }

        .tag-hint {
            font-size: 11.5px;
            color: #7a5c2a;
            background: var(--gold-lt);
            border: 1px solid #e8d5a0;
            border-radius: 7px;
            padding: 5px 11px;
            display: inline-block;
        }

        /* ── Footer ── */
        .form-footer {
            padding: 22px 36px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            flex-wrap: wrap;
        }

        .footer-note {
            font-size: 12.5px;
            color: var(--muted);
            font-weight: 400;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-submit {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 11px;
            padding: 13px 28px;
            font-size: 14.5px;
            font-weight: 600;
            font-family: 'Lato', sans-serif;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(30, 58, 95, 0.28);
            transition: all 0.2s;
        }

        .btn-submit:hover {
            background: #162d4a;
            box-shadow: 0 6px 22px rgba(30, 58, 95, 0.36);
            transform: translateY(-1px);
        }

        .btn-reset {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: transparent;
            color: var(--muted);
            border: 1.5px solid var(--border);
            border-radius: 11px;
            padding: 12px 20px;
            font-size: 13.5px;
            font-weight: 500;
            font-family: 'Lato', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-reset:hover {
            border-color: #b0baca;
            color: var(--text);
            background: #f1f4f8;
        }

        /* ── Responsive ── */
        @media (max-width: 640px) {

            /* .topbar { padding: 12px 16px; } */
            .form-section {
                padding: 22px 20px;
            }

            .form-footer {
                padding: 18px 20px;
                flex-direction: column;
                align-items: stretch;
            }

            .form-row.cols-2,
            .form-row.cols-3 {
                grid-template-columns: 1fr;
            }

            .btn-submit,
            .btn-reset {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>

<body>

    <!-- Top Bar with Back Button -->
    <button class="back-btn" onclick="window.location.href='/'">
    ← Back
</button>

    <!-- Page Header -->
    <div class="page-header">
        <!-- <p class="page-eyebrow">Alumni Portal</p> -->
        <h1 class="page-title">Post a Job or Internship</h1>
        <p class="page-subtitle">Share an opportunity with students and fellow alumni of the network.</p>
        <div class="title-rule"></div>
    </div>

    <!-- Form Card -->
    <div class="form-card">
        <div class="form-card-inner">
            <div class="card-accent-bar"></div>

            <form action="/job_post" method="post">

                <!-- Section 1: Role Overview -->
                <div class="form-section">
                    <div class="section-heading">Role Overview</div>

                    <div class="form-row cols-1">
                        <div class="field">
                            <label>Job / Internship Title <span class="req">*</span></label>
                            <input type="text" name="Title" placeholder="e.g. Frontend Developer Intern, Data Analyst">
                        </div>
                    </div>

                    <div class="form-row cols-3">
                        <div class="field">
                            <label>Opportunity Type <span class="req">*</span></label>
                            <select name="Type">
                                <option value="" disabled selected>Select type</option>
                                <option>Full-Time</option>
                                <option>Part-Time</option>
                                <option>Internship</option>
                                <option>Contract</option>
                                <option>Freelance</option>
                            </select>
                        </div>
                        <div class="field">
                            <label>Location <span class="req">*</span></label>
                            <input type="text" name="Location" placeholder="e.g. Remote, Bengaluru">
                        </div>
                        <div class="field">
                            <label>Duration</label>
                            <input type="text" name="Duration" placeholder="e.g. 3 months, 1 year">
                        </div>
                    </div>
                </div>

                <!-- Section 2: Role Details -->
                <div class="form-section">
                    <div class="section-heading">Role Details</div>

                    <div class="form-row cols-1">
                        <div class="field">
                            <label>Description <span class="req">*</span></label>
                            <textarea name="Description"
                                placeholder="Describe the role, responsibilities, team culture, and what makes this opportunity exciting..."></textarea>
                        </div>
                    </div>

                    <div class="form-row cols-1">
                        <div class="field">
                            <label>Requirements & Skills <span class="req">*</span></label>
                            <textarea name="Requirement"
                                placeholder="e.g. React.js, Node.js, 1+ yr experience, B.Tech CS preferred..."></textarea>
                            <span class="tag-hint">💡 Separate multiple skills with commas</span>
                        </div>
                    </div>

                    <div class="form-row cols-1">
                        <div class="field">
                            <label>Benefits & Perks</label>
                            <textarea name="Benefits"
                                placeholder="e.g. Stipend ₹15,000/month, Certificate, PPO opportunity, Flexible hours, Health insurance..."></textarea>
                        </div>
                    </div>
                </div>

                <!-- Section 3: Application Info -->
                <div class="form-section">
                    <div class="section-heading">Application Info</div>

                    <div class="form-row cols-2">
                        <div class="field">
                            <label>Application Deadline <span class="req">*</span></label>
                            <input type="date" name="Deadline">
                            <span class="field-hint">Applications close at end of selected date.</span>
                        </div>
                        <div class="field">
                            <label>Application Form Link <span class="req">*</span></label>
                            <input type="url" name="Form_Link" placeholder="https://forms.google.com/...">
                            <span class="field-hint">Students will be redirected to this link.</span>
                        </div>
                    </div>
                </div>

                <!-- Footer -->
                <div class="form-footer">
                    <span class="footer-note">
                        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2"
                            viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="10" />
                            <path d="M12 8v4M12 16h.01" />
                        </svg>
                        Fields marked <strong style="color:var(--gold);margin:0 3px;">*</strong> are required
                    </span>
                    <div style="display:flex;gap:10px;flex-wrap:wrap;">
                        <button type="reset" class="btn-reset">
                            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"
                                viewBox="0 0 24 24">
                                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                                <path d="M3 3v5h5" />
                            </svg>
                            Clear Form
                        </button>
                        <button type="submit" class="btn-submit">
                            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5"
                                viewBox="0 0 24 24">
                                <path d="M20 6L9 17l-5-5" />
                            </svg>
                            Post Opportunity
                        </button>
                    </div>
                </div>

            </form>
        </div>
    </div>
    <script>
        function goBack() {
            window.history.back();
        }
    </script>

</body>

</html>
