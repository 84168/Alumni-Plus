<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AlumniPlus | SGSITS CSE Department, Indore</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f0f4f8;
      --surface:   #ffffff;
      --surface2:  #f7f9fc;
      --border:    #e2e8f0;
      --border2:   #cbd5e0;
      --text:      #1a202c;
      --text2:     #4a5568;
      --muted:     #a0aec0;
      --accent:    #3b82f6;
      --accent-soft: #eff6ff;

      --bubble-own:       #3b82f6;
      --bubble-own-text:  #ffffff;
      --bubble-other:     #ffffff;
      --bubble-other-text:#1a202c;

      --student-bg: #dbeafe; --student-tx: #1e40af;
      --alumni-bg:  #fef3c7; --alumni-tx:  #92400e;
      --admin-bg:   #fee2e2; --admin-tx:   #991b1b;
      --faculty-bg: #d1fae5; --faculty-tx: #065f46;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .page-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: linear-gradient(135deg, #e0ecff 0%, #f0f4f8 55%, #fdf6ff 100%);
    }

    .chat-root {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 820px;
      height: calc(100vh - 32px);
      max-height: 780px;
      background: var(--surface);
      border-radius: 24px;
      box-shadow: 0 8px 40px rgba(59,130,246,0.10), 0 2px 8px rgba(0,0,0,0.06);
      overflow: hidden;
      border: 1px solid var(--border);
    }

    /* Header */
    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-left { display: flex; align-items: center; gap: 12px; }

    .header-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 12px rgba(59,130,246,0.3);
      flex-shrink: 0;
    }
    .header-icon svg { width: 19px; height: 19px; fill: white; }

    .header-title { font-size: 15px; font-weight: 700; color: var(--text); }
    .header-subtitle { font-size: 11.5px; color: var(--muted); margin-top: 1px; }

    .online-pill {
      display: flex; align-items: center; gap: 6px;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 20px;
      padding: 5px 13px;
      font-size: 12px; color: #15803d; font-weight: 600;
    }
    .online-dot {
      width: 7px; height: 7px;
      background: #22c55e; border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

    .back-btn {
      display: flex; align-items: center; gap: 5px;
      text-decoration: none;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text2);
      border-radius: 10px;
      padding: 6px 13px;
      font-size: 12.5px; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: all 0.15s;
    }
    .back-btn:hover { background: var(--accent-soft); border-color: #bfdbfe; color: var(--accent); }

    /* Messages */
    #messages {
      flex: 1; overflow-y: auto;
      padding: 20px 22px 8px;
      display: flex; flex-direction: column; gap: 2px;
      background: var(--surface2);
    }
    #messages::-webkit-scrollbar { width: 5px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    #messages::-webkit-scrollbar-thumb:hover { background: var(--border2); }

    .day-sep {
      display: flex; align-items: center; gap: 10px;
      margin: 18px 0 10px;
      color: var(--muted); font-size: 11px; font-weight: 700;
      letter-spacing: 0.07em; text-transform: uppercase;
    }
    .day-sep::before, .day-sep::after { content:''; flex:1; height:1px; background:var(--border); }

    .msg-group { display: flex; flex-direction: column; gap: 3px; margin-bottom: 12px; }
    .msg-group.own   { align-items: flex-end; }
    .msg-group.other { align-items: flex-start; }

    .msg-sender {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 5px; padding: 0 2px;
    }
    .msg-group.own .msg-sender { flex-direction: row-reverse; }

    .sender-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; flex-shrink: 0;
      text-transform: uppercase; color: #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,0.12);
    }

    .sender-name { font-size: 13px; font-weight: 700; color: var(--text); }

    .role-badge {
      font-size: 9px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 2px 8px; border-radius: 6px;
    }
    .role-badge.student { background: var(--student-bg); color: var(--student-tx); }
    .role-badge.alumni  { background: var(--alumni-bg);  color: var(--alumni-tx); }
    .role-badge.admin   { background: var(--admin-bg);   color: var(--admin-tx); }
    .role-badge.faculty { background: var(--faculty-bg); color: var(--faculty-tx); }

    .msg-bubble {
      max-width: 65%; padding: 10px 15px;
      border-radius: 16px;
      font-size: 14px; line-height: 1.6;
      word-break: break-word;
    }
    .msg-group.own .msg-bubble {
      background: var(--bubble-own);
      color: var(--bubble-own-text);
      border-bottom-right-radius: 5px;
      box-shadow: 0 3px 12px rgba(59,130,246,0.22);
    }
    .msg-group.other .msg-bubble {
      background: var(--bubble-other);
      color: var(--bubble-other-text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 5px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    .msg-time { font-size: 10.5px; color: var(--muted); margin-top: 3px; padding: 0 4px; font-weight: 500; }
    .msg-group.own .msg-time { text-align: right; }

    .sys-msg { text-align: center; font-size: 11.5px; color: var(--muted); padding: 6px 0; font-weight: 500; }

    #typing-bar {
      height: 22px; padding: 0 22px;
      font-size: 12px; color: var(--accent);
      font-style: italic; font-weight: 600;
      flex-shrink: 0; background: var(--surface2);
    }

    /* Input */
    .input-footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0; padding: 10px 16px 14px;
    }
    .char-counter { font-size: 10.5px; color: var(--muted); text-align: right; padding: 0 4px 6px; font-weight: 600; }
    .char-counter.warn { color: #f59e0b; }
    .char-counter.over { color: #ef4444; }

    .input-area { display: flex; align-items: center; gap: 10px; }

    #message-input {
      flex: 1; background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 14px; padding: 10px 16px;
      font-size: 14px; color: var(--text);
      font-family: inherit; font-weight: 500;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
      height: 44px; line-height: 1.4;
    }
    #message-input:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
      background: #fff;
    }
    #message-input::placeholder { color: var(--muted); }

    #send-btn {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      border: none; border-radius: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 14px rgba(59,130,246,0.35);
      transition: all 0.15s; flex-shrink: 0;
    }
    #send-btn:hover  { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(59,130,246,0.45); }
    #send-btn:active { transform: scale(0.96); }
    #send-btn:disabled { background: #e2e8f0; box-shadow: none; cursor: not-allowed; transform: none; }
    #send-btn svg { width: 17px; height: 17px; stroke: white; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

    /* Loading */
    .loading-screen {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100vh; gap: 14px;
      color: var(--text2); font-size: 14px; font-weight: 600;
      background: linear-gradient(135deg, #e0ecff 0%, #f0f4f8 55%, #fdf6ff 100%);
    }
    .spinner {
      width: 34px; height: 34px;
      border: 3px solid #e2e8f0;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="loading-screen" class="loading-screen">
  <div class="spinner"></div>
  <span>Connecting to chat...</span>
</div>

<div class="page-wrap" id="page-wrap" style="display:none;">
  <div class="chat-root">
    <header class="chat-header">
      <div class="header-left">
        <a href="/" class="back-btn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
          Home
        </a>
        <div class="header-icon">
          <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </div>
        <div>
          <div class="header-title">CSE Alumni Network Chat</div>
          <div class="header-subtitle" id="header-subtitle">Global room</div>
        </div>
      </div>
      <div class="online-pill">
        <span class="online-dot"></span>
        <span id="online-count">0 online</span>
      </div>
    </header>

    <div id="messages"></div>
    <div id="typing-bar"></div>

    <div class="input-footer">
      <div class="char-counter" id="char-counter">0 / 500</div>
      <div class="input-area">
        <input type="text" id="message-input" placeholder="Write a message..." maxlength="500" autocomplete="off" spellcheck="true" />
        <button id="send-btn" title="Send">
          <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const MAX_HISTORY_RENDER = 100;
  const TYPING_TIMEOUT_MS = 1200;

  let currentUser = null;
  let typingTimer = null;
  let isTyping = false;
  let lastMessageDate = null;
  let lastSenderId = null;

  function formatTime(ts) {
    return new Date(ts).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true });
  }

  function formatDate(ts) {
    const d = new Date(ts);
    const today = new Date();
    const yesterday = new Date(today);
    yesterday.setDate(today.getDate() - 1);
    if (d.toDateString() === today.toDateString()) return 'Today';
    if (d.toDateString() === yesterday.toDateString()) return 'Yesterday';
    return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  function getInitials(name) {
    return name.split(' ').slice(0, 2).map(w => w[0]).join('').toUpperCase();
  }

  function getAvatarColor(role) {
    const map = { student: '#3b82f6', alumni: '#f59e0b', admin: '#ef4444', faculty: '#10b981' };
    return map[(role || '').toLowerCase()] || '#94a3b8';
  }

  function renderMessage(msg, prepend = false) {
    const container = document.getElementById('messages');
    const isOwn = currentUser && String(msg.senderId) === String(currentUser.id);
    const msgDate = formatDate(msg.created_at || new Date());

    if (!prepend && msgDate !== lastMessageDate) {
      const sep = document.createElement('div');
      sep.className = 'day-sep';
      sep.textContent = msgDate;
      container.appendChild(sep);
      lastMessageDate = msgDate;
      lastSenderId = null;
    }

    const showHeader = prepend || String(msg.senderId) !== String(lastSenderId);
    const group = document.createElement('div');
    group.className = 'msg-group ' + (isOwn ? 'own' : 'other');

    if (showHeader) {
      const senderRow = document.createElement('div');
      senderRow.className = 'msg-sender';

      const avatar = document.createElement('div');
      avatar.className = 'sender-avatar';
      avatar.style.background = getAvatarColor(msg.senderRole);
      avatar.textContent = getInitials(msg.senderName);

      const nameSpan = document.createElement('span');
      nameSpan.className = 'sender-name';
      nameSpan.textContent = msg.senderName;

      const badge = document.createElement('span');
      badge.className = 'role-badge ' + (msg.senderRole || '').toLowerCase();
      badge.textContent = msg.senderRole || '';

      senderRow.appendChild(avatar);
      senderRow.appendChild(nameSpan);
      senderRow.appendChild(badge);
      group.appendChild(senderRow);
    }

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = msg.message;
    group.appendChild(bubble);

    const timeEl = document.createElement('div');
    timeEl.className = 'msg-time';
    timeEl.textContent = formatTime(msg.created_at || new Date());
    group.appendChild(timeEl);

    if (prepend) {
      container.insertBefore(group, container.firstChild);
    } else {
      container.appendChild(group);
      lastSenderId = msg.senderId;
    }
  }

  function scrollToBottom(smooth = true) {
    const c = document.getElementById('messages');
    c.scrollTo({ top: c.scrollHeight, behavior: smooth ? 'smooth' : 'auto' });
  }

  function initChat(user) {
    currentUser = user;
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('page-wrap').style.display = 'flex';
    document.getElementById('header-subtitle').textContent =
      'Logged in as ' + user.name + ' · ' + user.role;

    const socket = io({
    transports: ['websocket', 'polling'],
    auth: {
        userId: user.id,
        name: user.name,
        role: user.role,
        email: user.email || ''
    }
});

    socket.on('connect', () => {
      socket.emit('join-global-chat', { userId: user.id, userName: user.name, userRole: user.role });
    });

    socket.on('chat-history', (msgs) => {
      const container = document.getElementById('messages');
      container.innerHTML = '';
      lastMessageDate = null; lastSenderId = null;
      msgs.slice(-MAX_HISTORY_RENDER).forEach(m => renderMessage(m));
      scrollToBottom(false);
    });

    socket.on('global-message', (msg) => {
      renderMessage(msg);
      const c = document.getElementById('messages');
      if (c.scrollHeight - c.scrollTop - c.clientHeight < 120) scrollToBottom(true);
    });

    socket.on('online-count', (count) => {
      document.getElementById('online-count').textContent = count + ' online';
    });

    socket.on('global-typing', (data) => {
      const bar = document.getElementById('typing-bar');
      if (data.isTyping && String(data.userId) !== String(user.id)) {
        bar.textContent = data.userName + ' is typing...';
      } else {
        if (bar.textContent.startsWith(data.userName)) bar.textContent = '';
      }
    });

    const input = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const charCounter = document.getElementById('char-counter');

    function sendMessage() {
      const text = input.value.trim();
      if (!text || text.length > 500) return;
      socket.emit('global-message', { userId: user.id, userName: user.name, userRole: user.role, message: text });
      input.value = '';
      charCounter.textContent = '0 / 500';
      charCounter.className = 'char-counter';
      if (isTyping) {
        socket.emit('global-typing', { userId: user.id, userName: user.name, isTyping: false });
        isTyping = false;
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    input.addEventListener('input', () => {
      const len = input.value.length;
      charCounter.textContent = len + ' / 500';
      charCounter.className = 'char-counter' + (len > 450 ? (len >= 500 ? ' over' : ' warn') : '');
      if (!isTyping) {
        isTyping = true;
        socket.emit('global-typing', { userId: user.id, userName: user.name, isTyping: true });
      }
      clearTimeout(typingTimer);
      typingTimer = setTimeout(() => {
        isTyping = false;
        socket.emit('global-typing', { userId: user.id, userName: user.name, isTyping: false });
      }, TYPING_TIMEOUT_MS);
    });

    socket.on('disconnect', () => {
      const sysMsg = document.createElement('div');
      sysMsg.className = 'sys-msg';
      sysMsg.textContent = 'Connection lost — reconnecting...';
      document.getElementById('messages').appendChild(sysMsg);
    });

    socket.on('reconnect', () => {
      const sysMsg = document.createElement('div');
      sysMsg.className = 'sys-msg';
      sysMsg.textContent = 'Reconnected';
      document.getElementById('messages').appendChild(sysMsg);
      scrollToBottom(false);
    });
  }
const cached = sessionStorage.getItem('chatUser');
if (cached) {
    initChat(JSON.parse(cached));
} else {
    fetch('/me')
        .then(r => r.json())
        .then(data => {
            if (!data || !data.id) {
                window.location.href = '/login.html';
                return;
            }
            sessionStorage.setItem('chatUser', JSON.stringify(data));
            initChat(data);
        })
        .catch(() => { window.location.href = '/login.html'; });
}
</script>
</body>
</html>
